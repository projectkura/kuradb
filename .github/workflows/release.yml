name: Create release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install package dependencies
        run: bun install --frozen-lockfile

      - name: Run build script
        run: bun run build
        env:
          TGT_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Push version bump change
        uses: EndBug/add-and-commit@v9
        with:
          add: package.json
          push: true
          default_author: github_actions
          message: 'chore: bump version to ${{ github.ref_name }}'

      - name: Update tag
        uses: EndBug/latest-tag@v1
        with:
          ref: ${{ github.ref_name }}

      - name: Install zip
        run: sudo apt install zip

      - name: Bundle files
        run: |
          mkdir -p ./temp/kuradb/{dist,lib,docs}
          cp ./{LICENSE,README.md,fxmanifest.lua} ./temp/kuradb/ || true
          cp -r ./dist/* ./temp/kuradb/dist/ || true
          cp -r ./lib/* ./temp/kuradb/lib/ || true
          cp -r ./docs/* ./temp/kuradb/docs/ || true
          cd ./temp && zip -r ../kuradb.zip ./kuradb

      - name: Create release
        uses: 'marvinpinto/action-automatic-releases@v1.2.1'
        id: auto_release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: kuradb.zip
        env:
          CI: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
