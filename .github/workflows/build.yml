name: Build & Lint

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Run build
        run: bun run build

      - name: Typecheck
        run: bun run check

      - name: Verify pg-native compiled
        run: |
          if [ ! -f node_modules/libpq/build/Release/addon.node ]; then
            echo "::error::addon.node not found — pg-native failed to compile"
            exit 1
          fi
          echo "addon.node compiled successfully"

      - name: Package release
        run: bun run build:native

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuradb
          path: release/
